<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mahjong Seat Shuffle</title>
  <link rel="preload" as="image" href="pic/2ffb5324361dfd71d6a02701f0ff4250.jpg">
  <link rel="preload" as="image" href="pic/5ee9a04d8233202a53471842de44d5dd.jpg">
  <link rel="preload" as="image" href="pic/5a4079af4cc865cb69aebe92fb33d086.png">
  <link rel="preload" as="image" href="pic/65e6501f266153f6e844fe878132d475.jpg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>麻将随机换座位</h1>
      <p>自动洗牌、选庄与换座工具</p>
      <div class="action-row">
        <button id="pickDealerBtn" type="button" aria-label="pick dealer">首局选庄</button>
        <button id="shuffleBtn" type="button" aria-label="shuffle seats">开始换座</button>
        <button id="soundToggleBtn" type="button" aria-label="toggle sound" aria-pressed="true">音效: 开</button>
      </div>
      <div class="config-row">
        <label class="config-item">
          <span>音效模式</span>
          <select id="soundModeSelect">
            <option value="random">随机</option>
            <option value="music/1.mp3">音效 1</option>
            <option value="music/2.mp3">音效 2</option>
            <option value="music/3.mp3">音效 3</option>
            <option value="music/4.wav">音效 4 清脆</option>
            <option value="music/5.wav">音效 5 木敲</option>
            <option value="music/6.wav">音效 6 呼啸</option>
            <option value="music/7.wav">音效 7 亮铃</option>
            <option value="music/8.wav">音效 8 洗衣机旋转</option>
            <option value="music/9.wav">音效 9 马桶冲水</option>
          </select>
        </label>
        <label class="config-item">
          <span>换座动画</span>
          <select id="animationModeSelect">
            <option value="random">随机</option>
            <option value="drum">旋风洗牌</option>
            <option value="orbit">公转环绕</option>
            <option value="burst">冲散回位</option>
            <option value="cross">交叉换位</option>
            <option value="spiral">螺旋聚散</option>
          </select>
        </label>
      </div>
      <div class="upload-row">
        <label class="upload-label" for="avatarUploadInput">上传头像(最多4张)</label>
        <input id="avatarUploadInput" type="file" accept="image/*" multiple>
        <button id="clearAvatarsBtn" type="button">清除自定义头像</button>
      </div>
      <p id="uploadStatus" class="upload-status" aria-live="polite">支持手机相册或本地文件，上传后按上/右/下/左顺序替换头像</p>
    </header>

    <section class="table-wrap" aria-label="mahjong table">
      <div id="table" class="table">
        <div class="table-felt"></div>
        <div class="table-decor" aria-hidden="true">
          <div class="mahjong-wall wall-top"></div>
          <div class="mahjong-wall wall-right"></div>
          <div class="mahjong-wall wall-bottom"></div>
          <div class="mahjong-wall wall-left"></div>
          <div class="center-compass">
            <span class="compass-dir north">北</span>
            <span class="compass-dir east">东</span>
            <span class="compass-dir south">南</span>
            <span class="compass-dir west">西</span>
            <div class="dice-box">
              <span class="dice">⚄</span>
              <span class="dice">⚂</span>
            </div>
          </div>
        </div>
        <div class="seat seat-top" data-seat="top"><span>上</span></div>
        <div class="seat seat-right" data-seat="right"><span>右</span></div>
        <div class="seat seat-bottom" data-seat="bottom"><span>下</span></div>
        <div class="seat seat-left" data-seat="left"><span>左</span></div>
        <div id="drum" class="drum" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
