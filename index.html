<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mahjong Seat Shuffle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>麻将随机换座位</h1>
      <p>当前先只显示原版头像</p>
      <div class="action-row">
        <button id="shuffleBtn" type="button" aria-label="shuffle seats">换座位</button>
      </div>
    </header>

    <section class="table-wrap" aria-label="mahjong table">
      <div id="table" class="table">
        <div class="table-felt"></div>
        <div class="table-decor" aria-hidden="true">
          <div class="mahjong-wall wall-top"></div>
          <div class="mahjong-wall wall-right"></div>
          <div class="mahjong-wall wall-bottom"></div>
          <div class="mahjong-wall wall-left"></div>
          <div class="center-compass">
            <span class="compass-dir north">北</span>
            <span class="compass-dir east">东</span>
            <span class="compass-dir south">南</span>
            <span class="compass-dir west">西</span>
            <div class="dice-box">
              <span class="dice">⚄</span>
              <span class="dice">⚂</span>
            </div>
          </div>
        </div>
        <div class="seat seat-top" data-seat="top"><span>上</span></div>
        <div class="seat seat-right" data-seat="right"><span>右</span></div>
        <div class="seat seat-bottom" data-seat="bottom"><span>下</span></div>
        <div class="seat seat-left" data-seat="left"><span>左</span></div>
        <div id="drum" class="drum" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
